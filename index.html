<!DOCTYPE html>
<html>
<head>
    <title>AI.exe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        #container { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #view-window { width: 300px; height: 300px; margin: 20px auto; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid #334155; position: relative; }
        #webcam-container canvas, #img-preview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #img-preview { display: none; z-index: 10; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 10px; }
        button, .label-btn { background: #38bdf8; color: #0f172a; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 200px; display: block; }
        #file-input { display: none; }
        
        .result-bar { text-align: left; margin-top: 15px; }
        .bar-bg { background: #334155; height: 10px; border-radius: 5px; width: 100%; overflow: hidden; margin-top: 4px; }
        .bar-fill { background: #38bdf8; height: 100%; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div id="container">
    <h2>Cloud AI Scanner</h2>

    <div id="view-window">
        <div id="webcam-container"></div>
        <img id="img-preview" src="" />
    </div>

    <div class="btn-group">
      
        <label for="file-input" class="label-btn">Upload Image</label>
        <input type="file" id="file-input" accept="image/*">

        <!-- Webcam Button -->
        <button id="webcam-btn" onclick="startWebcam()">Use Webcam</button>
        
        <button id="reset-btn" style="display:none; background:#64748b;" onclick="backToCam()">Back to Live</button>
    </div>

    <div id="results"></div>
</div>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/6qiVASHGK/";
    let model, webcam, max;
    let isCamActive = false;

    async function loadModel() {
        if (!model) {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            max = model.getTotalClasses();
            setupUI();
        }
    }

    function setupUI() {
        const res = document.getElementById("results");
        res.innerHTML = "";
        for (let i = 0; i < max; i++) {
            res.innerHTML += `
                <div class="result-bar">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <span class="name"></span><span class="percent">0%</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill"></div></div>
                </div>`;
        }
    }

    async function startWebcam() {
        await loadModel();
        document.getElementById("webcam-btn").innerText = "Starting...";
        
        webcam = new tmImage.Webcam(300, 300, true);
        await webcam.setup();
        await webcam.play();
        
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        document.getElementById("webcam-btn").style.display = "none";
        isCamActive = true;
        loop();
    }

    async function loop() {
        if (isCamActive) {
            webcam.update();
            await predict(webcam.canvas);
            window.requestAnimationFrame(loop);
        }
    }

    document.getElementById('file-input').addEventListener('change', async function(e) {
        if (e.target.files && e.target.files[0]) {
            await loadModel();
            isCamActive = false;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('img-preview');
                img.src = event.target.result;
                img.style.display = "block";
                
                if (webcam) {
                    document.getElementById("reset-btn").style.display = "block";
                }
                
                img.onload = async () => {
                    await predict(img);
                };
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    function backToCam() {
        isCamActive = true;
        document.getElementById('img-preview').style.display = "none";
        document.getElementById("reset-btn").style.display = "none";
        loop();
    }

    async function predict(source) {
        const prediction = await model.predict(source);
        const bars = document.getElementsByClassName("result-bar");
        for (let i = 0; i < max; i++) {
            const p = (prediction[i].probability * 100).toFixed(0);
            bars[i].querySelector(".name").innerText = prediction[i].className;
            bars[i].querySelector(".percent").innerText = p + "%";
            bars[i].querySelector(".bar-fill").style.width = p + "%";
        }
    }
</script>

</body>
</html>
