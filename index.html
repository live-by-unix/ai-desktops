<!DOCTYPE html>
<html>
<head>
    <title>AI.exe</title>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; margin: 0; }
        #container { max-width: 400px; margin: 20px auto; background: #1e293b; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #view-window { width: 300px; height: 300px; margin: 0 auto 20px; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #334155; }
        canvas, #img-preview { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #img-preview { display: none; z-index: 10; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button, .label-btn { background: #38bdf8; color: #0f172a; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #7dd3fc; }
        input[type="file"] { display: none; }
        .result-bar { text-align: left; margin-top: 15px; }
        .bar-bg { background: #334155; height: 10px; border-radius: 5px; width: 100%; overflow: hidden; margin-top: 4px; }
        .bar-fill { background: #38bdf8; height: 100%; width: 0%; transition: 0.2s; }
    </style>
</head>
<body>

<div id="container">
    <h2>Cloud AI Scanner</h2>
    <div id="view-window">
        <div id="webcam-container"></div>
        <img id="img-preview" src="" />
    </div>

    <div class="btn-group">
        <label for="file-input" class="label-btn">Upload Image</label>
        <input type="file" id="file-input" accept="image/*">
        <button id="webcam-btn" onclick="startWebcam()">Use Live Webcam</button>
        <button id="reset-btn" style="display:none; background:#64748b; color:white;" onclick="backToCam()">Back to Live</button>
    </div>
    <div id="results"></div>
</div>

<script id="worker-code" type="text/javascript">
    const workerLogic = () => {
        importScripts("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js");
        importScripts("https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js");

        let model;
        const URL = "https://teachablemachine.withgoogle.com/models/6qiVASHGK/";

        async function load() {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            self.postMessage({ type: 'READY' });
        }

        load();

        self.onmessage = async (e) => {
            if (e.data.type === 'PREDICT' && model) {
                const prediction = await model.predict(e.data.bitmap);
                self.postMessage({ type: 'RESULT', prediction });
            }
        };
    };
</script>

<script>
    // MAIN THREAD LOGIC
    const blob = new Blob(['(', workerLogic.toString(), ')()'], { type: 'text/javascript' });
    const worker = new Worker(window.URL.createObjectURL(blob));
    
    let webcam, isCamActive = false;
    const resDiv = document.getElementById("results");

    worker.onmessage = (e) => {
        if (e.data.type === 'READY') {
            console.log("AI Thread Ready");
        }
        if (e.data.type === 'RESULT') {
            updateUI(e.data.prediction);
        }
    };

    async function startWebcam() {
        webcam = new tmImage.Webcam(300, 300, true);
        await webcam.setup();
        await webcam.play();
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        document.getElementById("webcam-btn").style.display = "none";
        isCamActive = true;
        loop();
    }

    async function loop() {
        if (isCamActive) {
            webcam.update();
            const bitmap = await createImageBitmap(webcam.canvas);
            worker.postMessage({ type: 'PREDICT', bitmap }, [bitmap]);
            window.requestAnimationFrame(loop);
        }
    }

    document.getElementById('file-input').onchange = async (e) => {
        if (e.target.files[0]) {
            isCamActive = false;
            const img = document.getElementById('img-preview');
            img.src = window.URL.createObjectURL(e.target.files[0]);
            img.style.display = "block";
            if (webcam) document.getElementById("reset-btn").style.display = "block";
            
            img.onload = async () => {
                const bitmap = await createImageBitmap(img);
                worker.postMessage({ type: 'PREDICT', bitmap }, [bitmap]);
            };
        }
    };

    function updateUI(predictions) {
        if (resDiv.innerHTML === "") {
            predictions.forEach(() => {
                resDiv.innerHTML += `<div class="result-bar">
                    <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
                        <span class="name"></span><span class="percent">0%</span>
                    </div>
                    <div class="bar-bg"><div class="bar-fill"></div></div>
                </div>`;
            });
        }
        const bars = document.getElementsByClassName("result-bar");
        predictions.forEach((p, i) => {
            const val = (p.probability * 100).toFixed(0);
            bars[i].querySelector(".name").innerText = p.className;
            bars[i].querySelector(".percent").innerText = val + "%";
            bars[i].querySelector(".bar-fill").style.width = val + "%";
        });
    }

    function backToCam() {
        isCamActive = true;
        document.getElementById('img-preview').style.display = "none";
        document.getElementById("reset-btn").style.display = "none";
        loop();
    }
</script>
</body>
</html>
