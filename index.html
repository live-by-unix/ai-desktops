<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop AI </title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f1f5f9;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            margin: 0; 
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        #webcam-container { 
            border-radius: 16px; 
            overflow: hidden; 
            border: 2px solid #334155; 
            margin: 20px auto; 
            background: #000;
            width: 300px;
            height: 300px;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: auto !important;
        }

        .label-row { margin-bottom: 20px; text-align: left; }
        
        .label-info { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bar-outer { 
            background: #334155; 
            border-radius: 20px; 
            height: 12px; 
            width: 100%; 
            overflow: hidden; 
        }

        .bar-inner { 
            background: var(--accent-color); 
            height: 100%; 
            width: 0%; 
            transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--accent-color);
        }

        button { 
            background: var(--accent-color); 
            color: var(--bg-color);
            border: none; 
            padding: 14px 28px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1rem;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); background: #7dd3fc; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="margin-top:0">Cloud AI Scanner</h1>
        <p style="color: #94a3b8; font-size: 0.9rem;">Live Classification System</p>
        
        <div id="webcam-container"></div>
        
        <button id="start-btn" onclick="init()">Launch Camera</button>
        
        <div id="label-container"></div>
    </div>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/6qiVASHGK/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            document.getElementById('start-btn').innerText = "Loading Model...";
            
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const flip = true; 
                webcam = new tmImage.Webcam(300, 300, flip); 
                await webcam.setup(); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                document.getElementById('start-btn').style.display = 'none';
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                labelContainer = document.getElementById("label-container");
                for (let i = 0; i < maxPredictions; i++) {
                    const row = document.createElement("div");
                    row.className = "label-row";
                    row.innerHTML = `
                        <div class="label-info">
                            <span class="class-name">...</span>
                            <span class="percentage">0%</span>
                        </div>
                        <div class="bar-outer">
                            <div class="bar-inner"></div>
                        </div>
                    `;
                    labelContainer.appendChild(row);
                }
            } catch (e) {
                alert("Please ensure you're using HTTPS or a local server!");
                console.error(e);
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classLabel = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0);
                
                const row = labelContainer.childNodes[i];
                row.querySelector(".class-name").innerText = classLabel;
                row.querySelector(".percentage").innerText = probability + "%";
                row.querySelector(".bar-inner").style.width = probability + "%";
                
               
                row.querySelector(".bar-inner").style.opacity = (probability / 100) + 0.2;
            }
        }
    </script>
</body>
</html>
